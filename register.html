<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkFlow PM — สมัครสมาชิก</title>
<link rel="stylesheet" href="shared.css">
<style>
body {
  background: var(--surface-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: var(--sp-6);
}

.auth-wrapper {
  width: 100%;
  max-width: 440px;
}

.auth-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: var(--sp-8);
}
.auth-logo-mark {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
  border-radius: var(--r-lg);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-md);
}
.auth-logo-mark svg { width: 22px; height: 22px; }
.auth-logo-text {
  font-size: 22px; font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.5px;
}
.auth-logo-text span { color: var(--brand-600); }

.auth-card {
  background: var(--surface-primary);
  border: 1px solid var(--border-primary);
  border-radius: var(--r-2xl);
  box-shadow: var(--shadow-lg);
  padding: var(--sp-10);
}

.auth-card h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  text-align: center;
  margin-bottom: var(--sp-1);
}
.auth-card .auth-subtitle {
  font-size: 14px;
  color: var(--text-tertiary);
  text-align: center;
  margin-bottom: var(--sp-8);
}

.form-group {
  margin-bottom: var(--sp-5);
}
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: var(--sp-2);
}
.input-icon-wrap {
  position: relative;
}
.input-icon-wrap .input {
  padding-left: 40px;
}
.input-icon-wrap svg {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--text-tertiary);
  pointer-events: none;
}

.form-row-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--sp-4);
}

.pw-strength {
  display: flex;
  gap: 4px;
  margin-top: var(--sp-2);
}
.pw-bar {
  flex: 1;
  height: 3px;
  border-radius: var(--r-full);
  background: var(--n-100);
  transition: background var(--t-fast);
}
.pw-bar.active-weak { background: var(--error-500); }
.pw-bar.active-med { background: var(--warning-500); }
.pw-bar.active-strong { background: var(--success-500); }
.pw-hint {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: var(--sp-1);
}

.auth-btn {
  width: 100%;
  height: 44px;
  font-size: 15px;
  margin-top: var(--sp-3);
  margin-bottom: var(--sp-6);
}

.auth-terms {
  font-size: 12px;
  color: var(--text-tertiary);
  text-align: center;
  margin-bottom: var(--sp-5);
  line-height: 1.6;
}
.auth-terms a {
  color: var(--brand-600);
  font-weight: 600;
}
.auth-terms a:hover { text-decoration: underline; }

.auth-footer {
  text-align: center;
  font-size: 14px;
  color: var(--text-tertiary);
  margin-top: var(--sp-6);
}
.auth-footer a {
  color: var(--brand-600);
  font-weight: 600;
}
.auth-footer a:hover { text-decoration: underline; }

.error-msg {
  font-size: 12px;
  color: var(--error-700);
  margin-top: var(--sp-1);
  display: none;
}
.error-msg.show { display: block; }
</style>
</head>
<body>

<div class="auth-wrapper animate-in">
  <!-- Logo -->
  <div class="auth-logo">
    <div class="auth-logo-mark">
      <svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
      </svg>
    </div>
    <div class="auth-logo-text">Work<span>Flow</span></div>
  </div>

  <!-- Card -->
  <div class="auth-card">
    <h2>สร้างบัญชีใหม่</h2>
    <p class="auth-subtitle">เริ่มต้นจัดการโปรเจกต์กับทีมของคุณ</p>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <!-- Name row -->
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">ชื่อ</label>
          <div class="input-icon-wrap">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <input type="text" class="input" placeholder="ชื่อ" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">นามสกุล</label>
          <input type="text" class="input" placeholder="นามสกุล" required>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">อีเมล</label>
        <div class="input-icon-wrap">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <input type="email" class="input" placeholder="your@email.com" required>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">รหัสผ่าน</label>
        <div class="input-icon-wrap">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input type="password" id="pwInput" class="input" placeholder="อย่างน้อย 8 ตัวอักษร" required oninput="checkStrength(this.value)">
        </div>
        <div class="pw-strength">
          <div class="pw-bar" id="bar1"></div>
          <div class="pw-bar" id="bar2"></div>
          <div class="pw-bar" id="bar3"></div>
          <div class="pw-bar" id="bar4"></div>
        </div>
        <div class="pw-hint" id="pwHint">ใช้ตัวอักษรพิมพ์เล็ก พิมพ์ใหญ่ ตัวเลข และอักขระพิเศษ</div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label">ยืนยันรหัสผ่าน</label>
        <div class="input-icon-wrap">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
          <input type="password" id="confirmPw" class="input" placeholder="กรอกรหัสผ่านอีกครั้ง" required oninput="checkMatch()">
        </div>
        <div class="error-msg" id="matchError">รหัสผ่านไม่ตรงกัน</div>
      </div>

      <!-- Terms -->
      <div class="auth-terms">
        การสมัครหมายถึงคุณยอมรับ <a href="#">ข้อกำหนดการใช้งาน</a> และ <a href="#">นโยบายความเป็นส่วนตัว</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary auth-btn">สร้างบัญชี</button>
    </form>

    <!-- Login link -->
    <div class="auth-footer">
      มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a>
    </div>
  </div>
</div>

<script>
function checkStrength(val) {
  const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
  const hint = document.getElementById('pwHint');

  // Reset
  bars.forEach(b => b.className = 'pw-bar');

  if (!val) {
    hint.textContent = 'ใช้ตัวอักษรพิมพ์เล็ก พิมพ์ใหญ่ ตัวเลข และอักขระพิเศษ';
    return;
  }

  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;

  const cls = score <= 1 ? 'active-weak' : score <= 2 ? 'active-med' : 'active-strong';
  const labels = ['', 'อ่อน', 'ปานกลาง', 'ดี', 'แข็งแรงมาก'];

  for (let i = 0; i < score; i++) {
    bars[i].classList.add(cls);
  }
  hint.textContent = labels[score] || '';
}

function checkMatch() {
  const pw = document.getElementById('pwInput').value;
  const confirm = document.getElementById('confirmPw').value;
  const err = document.getElementById('matchError');
  if (confirm && pw !== confirm) {
    err.classList.add('show');
  } else {
    err.classList.remove('show');
  }
}

function handleRegister(e) {
  e.preventDefault();
  const pw = document.getElementById('pwInput').value;
  const confirm = document.getElementById('confirmPw').value;
  if (pw !== confirm) {
    document.getElementById('matchError').classList.add('show');
    return;
  }
  window.location.href = 'create-org.html';
}
</script>
</body>
</html>
