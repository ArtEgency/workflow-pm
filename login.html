<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkFlow PM — เข้าสู่ระบบ</title>
<link rel="stylesheet" href="shared.css">
<style>
body {
  background: var(--surface-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: var(--sp-6);
}

.auth-wrapper {
  width: 100%;
  max-width: 440px;
}

.auth-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: var(--sp-8);
}
.auth-logo-mark {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
  border-radius: var(--r-lg);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-md);
}
.auth-logo-mark svg { width: 22px; height: 22px; }
.auth-logo-text {
  font-size: 22px; font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.5px;
}
.auth-logo-text span { color: var(--brand-600); }

.auth-card {
  background: var(--surface-primary);
  border: 1px solid var(--border-primary);
  border-radius: var(--r-2xl);
  box-shadow: var(--shadow-lg);
  padding: var(--sp-10);
}

.auth-card h2 {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  text-align: center;
  margin-bottom: var(--sp-1);
}
.auth-card .auth-subtitle {
  font-size: 14px;
  color: var(--text-tertiary);
  text-align: center;
  margin-bottom: var(--sp-8);
}

.form-group {
  margin-bottom: var(--sp-5);
}
.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: var(--sp-2);
}
.input-icon-wrap {
  position: relative;
}
.input-icon-wrap .input {
  padding-left: 40px;
}
.input-icon-wrap svg {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  color: var(--text-tertiary);
  pointer-events: none;
}
.input-icon-wrap .toggle-pw {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--text-tertiary);
  border-radius: var(--r-sm);
  pointer-events: auto;
  background: none; border: none;
}
.input-icon-wrap .toggle-pw:hover { color: var(--text-secondary); background: var(--surface-secondary); }
.input-icon-wrap .toggle-pw svg { position: static; transform: none; width: 16px; height: 16px; }

.form-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--sp-6);
}
.form-check {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text-secondary);
  cursor: pointer;
}
.form-check input[type="checkbox"] {
  width: 16px; height: 16px;
  accent-color: var(--brand-500);
  cursor: pointer;
}
.form-link {
  font-size: 13px; font-weight: 600;
  color: var(--brand-600);
  cursor: pointer;
  background: none; border: none;
  font-family: var(--font-sans);
}
.form-link:hover { color: var(--brand-700); text-decoration: underline; }

.auth-btn {
  width: 100%;
  height: 44px;
  font-size: 15px;
  margin-bottom: var(--sp-6);
}

.auth-divider {
  display: flex; align-items: center; gap: var(--sp-4);
  margin-bottom: var(--sp-6);
}
.auth-divider::before,
.auth-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-primary);
}
.auth-divider span {
  font-size: 12px;
  color: var(--text-tertiary);
  font-weight: 500;
}

.social-btns {
  display: flex; gap: var(--sp-3);
  margin-bottom: var(--sp-6);
}
.social-btn {
  flex: 1;
  height: 40px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--surface-primary);
  border: 1px solid var(--border-primary);
  border-radius: var(--r-md);
  font-family: var(--font-sans);
  font-size: 13px; font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  transition: all var(--t-fast) var(--ease);
  box-shadow: var(--shadow-xs);
}
.social-btn:hover { background: var(--surface-secondary); border-color: var(--n-300); }
.social-btn svg { width: 18px; height: 18px; }

.auth-footer {
  text-align: center;
  font-size: 14px;
  color: var(--text-tertiary);
  margin-top: var(--sp-6);
}
.auth-footer a {
  color: var(--brand-600);
  font-weight: 600;
}
.auth-footer a:hover { text-decoration: underline; }

/* Toast */
.toast {
  position: fixed;
  top: 24px;
  right: 24px;
  background: var(--n-900);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--r-lg);
  font-size: 14px;
  font-weight: 500;
  box-shadow: var(--shadow-xl);
  z-index: 200;
  opacity: 0;
  transform: translateY(-12px);
  transition: all var(--t-med) var(--ease);
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="auth-wrapper animate-in">
  <!-- Logo -->
  <div class="auth-logo">
    <div class="auth-logo-mark">
      <svg fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
      </svg>
    </div>
    <div class="auth-logo-text">Work<span>Flow</span></div>
  </div>

  <!-- Card -->
  <div class="auth-card">
    <h2>เข้าสู่ระบบ</h2>
    <p class="auth-subtitle">จัดการโปรเจกต์ของคุณได้ง่ายขึ้น</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <!-- Email -->
      <div class="form-group">
        <label class="form-label">อีเมล</label>
        <div class="input-icon-wrap">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <input type="email" class="input" placeholder="your@email.com" value="admin@egency.co" required>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">รหัสผ่าน</label>
        <div class="input-icon-wrap">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input type="password" id="pwInput" class="input" placeholder="รหัสผ่านของคุณ" value="password123" required style="padding-right: 42px;">
          <button type="button" class="toggle-pw" onclick="togglePassword()">
            <svg id="eyeIcon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Remember + Forgot -->
      <div class="form-row">
        <label class="form-check">
          <input type="checkbox" checked>
          จดจำฉัน
        </label>
        <button type="button" class="form-link" onclick="showToast('ระบบส่ง link รีเซ็ตรหัสผ่านไปที่อีเมลแล้ว')">ลืมรหัสผ่าน?</button>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary auth-btn">เข้าสู่ระบบ</button>
    </form>

    <!-- Social divider -->
    <div class="auth-divider"><span>หรือเข้าด้วย</span></div>

    <!-- Social buttons -->
    <div class="social-btns">
      <button class="social-btn" onclick="showToast('Google SSO (demo)')">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button class="social-btn" onclick="showToast('Microsoft SSO (demo)')">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
          <rect x="13" y="1" width="10" height="10" fill="#7FBA00"/>
          <rect x="1" y="13" width="10" height="10" fill="#00A4EF"/>
          <rect x="13" y="13" width="10" height="10" fill="#FFB900"/>
        </svg>
        Microsoft
      </button>
    </div>

    <!-- Register link -->
    <div class="auth-footer">
      ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
function handleLogin(e) {
  e.preventDefault();
  window.location.href = 'account-dashboard.html';
}

function togglePassword() {
  const pw = document.getElementById('pwInput');
  const icon = document.getElementById('eyeIcon');
  if (pw.type === 'password') {
    pw.type = 'text';
    icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
  } else {
    pw.type = 'password';
    icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  t.addEventListener('transitionend', function handler() {
    t.removeEventListener('transitionend', handler);
    requestAnimationFrame(() => {
      t.classList.remove('show');
    });
  });
}
</script>
</body>
</html>
